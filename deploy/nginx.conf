# /etc/nginx/sites-available/arbitrance
# Arbitrance — Nginx reverse proxy config
# Proxies: Next.js (3000), Price Server (3001), WebSocket (3002)

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;   # Replace _ with your domain if you have one

    # Redirect HTTP to HTTPS (uncomment after certbot setup)
    # return 301 https://$host$request_uri;

    # ── Next.js App ──────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── WebSocket (real-time price feed on port 3002) ─────────────
    location /ws {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;   # keep WS connections alive
    }

    # ── Next.js HMR WebSocket (dev mode) ─────────────────────────
    location /_next/webpack-hmr {
        proxy_pass         http://127.0.0.1:3000/_next/webpack-hmr;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
    }

    # Increase body size for API payloads
    client_max_body_size 10M;
}

